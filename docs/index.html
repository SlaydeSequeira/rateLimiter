<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rate-limit-service // live demo</title>
  <meta name="description" content="Interactive terminal demo of a token-bucket rate limiting microservice." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23060709'/%3E%3Ctext x='9' y='45' font-family='monospace' font-size='36' font-weight='bold' fill='%233fb950'%3E%3E_%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============================ Main terminal ============================ -->
  <main class="term app" id="app">
    <div class="term-bar">
      <span class="traffic">
        <button class="dot red" id="winClose" title="close" aria-label="close"></button>
        <button class="dot amber" id="winMin" title="minimize" aria-label="minimize"></button>
        <button class="dot green" id="winMax" title="maximize / restore" aria-label="maximize or restore"></button>
      </span>
      <span class="term-title">slayde@rate-limit-service: ~</span>
      <span class="status-pill" id="statusPill">
        <span id="warmDot" class="dot amber pulse"></span>
        <span id="warmText">connecting…</span>
      </span>
      <button id="logBtn" class="btn ghost tiny" title="Show / hide the request log">▤ log</button>
      <button id="helpBtn" class="btn ghost tiny" title="Replay the tour">? tour</button>
    </div>

    <div class="term-body grid" id="grid">

      <!-- ---------- Left: configuration ---------- -->
      <section class="panel config">
        <div class="panel-head"># config <span class="dim">— shape the request</span></div>

        <label class="field" id="fAlgo">
          <span class="lbl">algorithm</span>
          <select id="algo">
            <option value="token_bucket" selected>token_bucket</option>
            <option value="leaky_bucket">leaky_bucket</option>
            <option value="fixed_window">fixed_window</option>
            <option value="sliding_window">sliding_window</option>
          </select>
          <div class="algo-desc" id="algoDesc"></div>
        </label>

        <div id="limitsGroup">
          <label class="field">
            <span class="lbl">capacity <span class="dim">(max burst)</span></span>
            <div class="row">
              <input id="capacity" type="range" min="1" max="50" value="5" />
              <input id="capacityNum" type="number" min="1" max="500" value="5" class="num" />
            </div>
          </label>

          <label class="field">
            <span class="lbl">refill / sec <span class="dim">(steady rate)</span></span>
            <div class="row">
              <input id="refill" type="range" min="0" max="20" step="0.25" value="0.25" />
              <input id="refillNum" type="number" min="0" max="500" step="0.25" value="0.25" class="num" />
            </div>
          </label>

          <label class="field">
            <span class="lbl">cost <span class="dim">(tokens / request)</span></span>
            <input id="cost" type="number" min="1" max="50" value="1" class="num wide" />
          </label>
        </div>
      </section>

      <!-- ---------- Center: the bucket ---------- -->
      <section class="panel stage">
        <div class="panel-head"># token bucket <span class="dim" id="rateCaption"></span></div>

        <div class="bucket-wrap">
          <div class="bucket" id="bucket">
            <div class="bucket-fill" id="bucketFill"></div>
            <div class="bucket-reading">
              <span id="tokenCount">5</span><span class="dim">/<span id="tokenCap">5</span></span>
              <div class="dim small">tokens</div>
            </div>
          </div>
          <div class="pips" id="pips"></div>
        </div>

        <div class="narration" id="narration">
          <span class="prompt">$</span> ready. press <b>SEND REQUEST</b> to spend a token.
        </div>

        <div class="controls">
          <button id="send" class="btn primary big">SEND REQUEST</button>
          <button id="burst" class="btn">send &times;10</button>
          <button id="auto" class="btn">auto&nbsp;<span id="autoState">▶</span></button>
          <select id="autoSpeed" class="num" title="auto-fire interval">
            <option value="1000">1 / sec</option>
            <option value="500" selected>2 / sec</option>
            <option value="200">5 / sec</option>
          </select>
          <button id="copyCurl" class="btn" title="Copy a ready-to-run curl for the current settings">⧉ copy curl</button>
          <button id="reset" class="btn ghost">reset view</button>
        </div>

        <div class="stats">
          <span>sent <b id="statSent">0</b></span>
          <span class="ok">allowed <b id="statOk">0</b></span>
          <span class="bad">denied <b id="statBad">0</b></span>
        </div>
      </section>

      <!-- ---------- Right: live log ---------- -->
      <section class="panel logwrap">
        <div class="panel-head"># request log <span class="dim">— live HTTP to Render</span></div>
        <div class="log" id="log"></div>
      </section>

    </div>
  </main>

  <!-- shown when the terminal is minimized/closed; click to reopen -->
  <button id="launcher" class="launcher" aria-label="reopen the rate-limit-service terminal">
    <span class="launcher-icon">&gt;_</span>
    <span class="launcher-text">rate-limit-service<small>click to reopen</small></span>
  </button>

  <script src="app.js"></script>
</body>
</html>
